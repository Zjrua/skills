# Complete Xiaomi Token Plan Hermes Config

## `~/.hermes/.env` additions

```bash
XIAOMI_API_KEY=tp-xxxx...
XIAOMI_BASE_URL=https://token-plan-cn.xiaomimimo.com/v1

# STT via omni model (instead of faster-whisper)
HERMES_LOCAL_STT_COMMAND=~/.hermes/scripts/xiaomi-stt.sh {input_path} {output_dir} {language} {model}
HERMES_LOCAL_STT_LANGUAGE=zh
```

## `~/.hermes/config.yaml` sections

```yaml
# Provider: built-in xiaomi (not custom_providers)
# Already configured via XIAOMI_API_KEY + XIAOMI_BASE_URL env vars

# TTS via custom command provider
tts:
  provider: xiaomi          # or 'edge' (default), switch as needed
  providers:
    xiaomi:
      type: command
      command: "~/.hermes/scripts/xiaomi-tts.sh {input_path} {output_path}"
      output_format: wav
      max_text_length: 5000

# STT via local command (uses HERMES_LOCAL_STT_COMMAND)
stt:
  enabled: true
  provider: local
  local:
    model: base             # ignored by the omni script
    language: zh            # passed as {language} placeholder
```

## Switching TTS providers

```bash
# To Xiaomi
hermes config set tts.provider xiaomi
# Back to Edge
hermes config set tts.provider edge
```

## Verification

### TTS
```bash
echo "你好" > /tmp/tts_test.txt
~/.hermes/scripts/xiaomi-tts.sh /tmp/tts_test.txt /tmp/tts_output.wav
file /tmp/tts_output.wav   # Should show: RIFF, WAVE audio, PCM 16-bit mono 24000Hz
```

### STT
```bash
mkdir -p /tmp/stt_test
~/.hermes/scripts/xiaomi-stt.sh /path/to/voice.wav /tmp/stt_test zh mimo-v2-omni
cat /tmp/stt_test/xiaomi-omni.txt
```
